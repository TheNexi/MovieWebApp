<main class="app-shell">
  <ng-container *ngIf="loggedIn; else authOnly">
    <nav class="app-nav">
      <a routerLink="/home">Home</a>
      <a routerLink="/movie/1">Movie Details</a>
      <a routerLink="/favourites">Favourites</a>
      <a routerLink="/profile">Profile</a>
      <button (click)="logout()" style="margin-left: 16px">Wyloguj</button>
    </nav>
    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </ng-container>
  <ng-template #authOnly>
    <router-outlet></router-outlet>
  </ng-template>
</main>
