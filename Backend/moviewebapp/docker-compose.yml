services:
  postgres:
    image: postgres:16-alpine
    container_name: moviewebapp-postgres
    environment:
      POSTGRES_DB: moviewebapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - moviewebapp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moviewebapp"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: moviewebapp-backend
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/moviewebapp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - moviewebapp-m2-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  moviewebapp-postgres-data:
  moviewebapp-m2-cache: